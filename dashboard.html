<section id="educacaoSaude" class="card-modulo">

    <h2>📚 Educação em Saúde</h2>

    <p>
        Aprenda a identificar alterações nos pés,
        prevenir complicações e conhecer os
        cuidados diários recomendados.
    </p>

    <div class="cards-educacao">

        <button class="card-educacao" onclick="abrirFlashCard('pe-saudavel')">

            <img
                src="imagens/educacao/pe-saudavel.png"
                alt="Pé saudável">

            <h3>Pé Saudável</h3>

            <p>
                Conheça as características
                de um pé saudável.
            </p>

        </button>

        <button class="card-educacao" onclick="abrirFlashCard('calosidade')">

            <img
                src="imagens/educacao/calosidade.png"
                alt="Calosidade">

            <h3>Calosidade</h3>

            <p>
                Aprenda como prevenir
                e identificar.
            </p>

        </button>

        <button class="card-educacao" onclick="abrirFlashCard('ulcera')">

            <img
                src="imagens/educacao/ulcera.png"
                alt="Úlcera">

            <h3>Úlcera</h3>

            <p>
                Saiba quando procurar
                atendimento.
            </p>

        </button>

        <button class="card-educacao" onclick="abrirFlashCard('calcado')">

            <img
                src="imagens/educacao/calcado.png"
                alt="Calçado">

            <h3>Calçado Correto</h3>

            <p>
                Escolha o calçado ideal
                para proteger seus pés.
            </p>

        </button>

    </div>

</section>
