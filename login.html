<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passo Seguro - Login</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>👣 Passo Seguro</h1>

<p>Monitoramento e Autocuidado para Pessoas com Diabetes</p>

<div class="card">

<h2>Entrar</h2>

<input type="email" id="loginEmail" placeholder="E-mail">

<input type="password" id="loginSenha" placeholder="Senha">

<button id="btnLogin">
Entrar
</button>

</div>

<br>

<div class="card">

<h2>Criar Conta</h2>

<input type="text" id="nome" placeholder="Nome">

<input type="email" id="email" placeholder="E-mail">

<input type="password" id="senha" placeholder="Senha">

<input type="text" id="telefone" placeholder="Telefone">

<input type="date" id="nascimento">

<input type="text" id="cidade" placeholder="Cidade">

<select id="uf">

<option>AC</option>
<option>AL</option>
<option>AP</option>
<option>AM</option>
<option>BA</option>
<option>CE</option>
<option>DF</option>
<option>ES</option>
<option>GO</option>
<option>MA</option>
<option>MT</option>
<option>MS</option>
<option>MG</option>
<option>PA</option>
<option>PB</option>
<option>PR</option>
<option>PE</option>
<option>PI</option>
<option>RJ</option>
<option>RN</option>
<option>RS</option>
<option>RO</option>
<option>RR</option>
<option>SC</option>
<option>SP</option>
<option>SE</option>
<option>TO</option>

</select>

<button id="btnCadastro">
Cadastrar
</button>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>

</body>
</html>
