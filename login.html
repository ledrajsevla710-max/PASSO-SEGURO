<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Passo Seguro - Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>👣 Passo Seguro</h1>

            <h2>Entrar</h2>

            <input
                type="email"
                id="email"
                placeholder="E-mail">

            <input
                type="password"
                id="senha"
                placeholder="Senha">

            <button id="btnLogin">
                Entrar
            </button>

            <hr>

            <p>Não possui cadastro?</p>

            <button
                onclick="window.location.href='index.html'">
                Criar Conta
            </button>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
